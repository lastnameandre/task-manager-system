<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Task Details</title>
  <link rel="stylesheet" th:href="@{/css/style.css}" />
</head>
<body>
<div class="container">
  <h2>Task Details</h2>
  <p><strong>ID:</strong> <span th:text="${task.id}"></span></p>
  <p><strong>Title:</strong> <span th:text="${task.title}"></span></p>
  <p><strong>Description:</strong> <span th:text="${task.description}"></span></p>
  <p><strong>Status:</strong> <span th:text="${task.status}"></span></p>
  <p><strong>Assigned To:</strong> <span th:text="${task.assignedTo.username}"></span></p>
  <p><strong>Created At:</strong> <span th:text="${#temporals.format(task.createdAt, 'yyyy-MM-dd HH:mm')}"></span></p>
  <a th:href="@{/dashboard}">Back to Dashboard</a>
</div>
</body>
</html>
